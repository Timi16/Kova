[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
injective_testnet = "${INJECTIVE_TESTNET_RPC}"
injective_mainnet = "${INJECTIVE_MAINNET_RPC}"

[etherscan]
injective_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${INJECTIVE_TESTNET_EXPLORER}" }
