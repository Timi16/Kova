"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Meta {
  status: JSON
}

type Query {
  syncState(id: String!): syncState
  syncStates(where: syncStateFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): syncStatePage!
  _meta: Meta
}

type syncState {
  id: String!
}

type syncStatePage {
  items: [syncState!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input syncStateFilter {
  AND: [syncStateFilter]
  OR: [syncStateFilter]
  id: String
  id_not: String
  id_in: [String]
  id_not_in: [String]
  id_contains: String
  id_not_contains: String
  id_starts_with: String
  id_ends_with: String
  id_not_starts_with: String
  id_not_ends_with: String
}